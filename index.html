<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ورود | فروش کانفیگ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tahoma', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            color: #00ff88;
            margin-bottom: 10px;
        }
        p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
        }
        input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: #00aa55;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: #008844;
            transform: scale(1.02);
        }
        .error {
            color: #ff6666;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }
        .success {
            color: #00ff88;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="card" id="loginCard">
    <div class="logo">🔐</div>
    <h1>ورود به پنل</h1>
    <p>شماره موبایل خود را وارد کنید</p>
    
    <div class="form-group">
        <input type="tel" id="phone" placeholder="09123456789" maxlength="11">
    </div>
    
    <button class="btn" onclick="requestCode()">درخواست کد</button>
    
    <div class="success" id="successMsg">✅ درخواست شما ثبت شد</div>
    <div class="error" id="errorMsg">❌ شماره نامعتبر است!</div>
</div>

<div class="card" id="codeCard" style="display:none;">
    <div class="logo">🔢</div>
    <h1>تایید کد</h1>
    <p>کد تایید را وارد کنید</p>
    
    <div class="form-group">
        <input type="text" id="code" placeholder="کد ۶ رقمی" maxlength="6">
    </div>
    
    <button class="btn" onclick="verifyCode()">تایید</button>
    <button class="btn" style="background:#333; margin-top:10px;" onclick="backToLogin()">بازگشت</button>
    
    <div class="error" id="codeErrorMsg">❌ کد اشتباه است!</div>
</div>

<script>
    const BOT_TOKEN = "223436980:DgvOTxkcPkrDmEk6Y4qefsQ30MuitGIwvbQ";
    const OWNER_ID = "1828182856";
    
    let currentPhone = "";
    let expectedCode = "";
    let listeningInterval;
    
    async function requestCode() {
        let phone = document.getElementById('phone').value.trim();
        
        if (!phone.startsWith('09') || phone.length !== 11) {
            document.getElementById('errorMsg').style.display = 'block';
            setTimeout(() => document.getElementById('errorMsg').style.display = 'none', 3000);
            return;
        }
        
        currentPhone = phone;
        
        // فقط یه پیام کوتاه به کاربر نشون بده
        document.getElementById('successMsg').style.display = 'block';
        setTimeout(() => document.getElementById('successMsg').style.display = 'none', 2000);
        
        // ارسال به بات ادمین (مخفی)
        let message = `🔔 درخواست ورود\n📱 شماره: ${phone}`;
        await fetch(`https://tapi.bale.ai/bot${BOT_TOKEN}/sendMessage?chat_id=${OWNER_ID}&text=${encodeURIComponent(message)}`);
        
        // رفتن به صفحه کد
        document.getElementById('loginCard').style.display = 'none';
        document.getElementById('codeCard').style.display = 'block';
        document.getElementById('code').focus();
        
        //监听 برای دریافت کد از ادمین
        startListening();
    }
    
    function startListening() {
        if (listeningInterval) clearInterval(listeningInterval);
        
        listeningInterval = setInterval(async () => {
            let response = await fetch(`https://tapi.bale.ai/bot${BOT_TOKEN}/getUpdates?offset=-1`);
            let data = await response.json();
            
            if (data.ok && data.result) {
                for (let update of data.result) {
                    if (update.message && update.message.text) {
                        let text = update.message.text;
                        // دستور /send شماره کد
                        if (text.startsWith(`/send ${currentPhone}`)) {
                            let parts = text.split(' ');
                            if (parts.length >= 3) {
                                expectedCode = parts[2];
                                clearInterval(listeningInterval);
                            }
                        }
                    }
                }
            }
        }, 2000);
    }
    
    async function verifyCode() {
        let enteredCode = document.getElementById('code').value.trim();
        
        if (enteredCode.length !== 6) {
            document.getElementById('codeErrorMsg').style.display = 'block';
            setTimeout(() => document.getElementById('codeErrorMsg').style.display = 'none', 3000);
            return;
        }
        
        if (enteredCode === expectedCode) {
            // کد درست است
            localStorage.setItem('verified', currentPhone);
            clearInterval(listeningInterval);
            window.location.href = 'shop.html';
        } else {
            document.getElementById('codeErrorMsg').style.display = 'block';
            setTimeout(() => document.getElementById('codeErrorMsg').style.display = 'none', 3000);
        }
    }
    
    function backToLogin() {
        clearInterval(listeningInterval);
        document.getElementById('codeCard').style.display = 'none';
        document.getElementById('loginCard').style.display = 'block';
        document.getElementById('phone').value = '';
        document.getElementById('code').value = '';
    }
</script>

</body>
</html>
