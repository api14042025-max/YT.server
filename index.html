<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ورود | فروش کانفیگ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tahoma', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            color: #00ff88;
            margin-bottom: 10px;
        }
        p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
        }
        input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: #00aa55;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: #008844;
            transform: scale(1.02);
        }
        .error {
            color: #ff6666;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }
        .success {
            color: #00ff88;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #666;
        }
        .code-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            border: 1px solid #ffd966;
            display: none;
        }
        .code-box-title {
            font-size: 12px;
            color: #ffd966;
            margin-bottom: 10px;
        }
        .code-display {
            font-size: 32px;
            font-weight: bold;
            color: #00ff88;
            letter-spacing: 5px;
            font-family: monospace;
        }
        .code-hint {
            font-size: 11px;
            color: #888;
            margin-top: 10px;
        }
        .refresh-btn {
            background: #ff8800;
            margin-top: 10px;
            padding: 8px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="card" id="loginCard">
    <div class="logo">🔐</div>
    <h1>ورود به پنل</h1>
    <p>شماره موبایل خود را وارد کنید</p>
    
    <div class="form-group">
        <input type="tel" id="phone" placeholder="09123456789" maxlength="11">
    </div>
    
    <button class="btn" onclick="requestCode()">درخواست کد</button>
    
    <div class="success" id="successMsg">✅ درخواست شما ثبت شد</div>
    <div class="error" id="errorMsg">❌ شماره نامعتبر است!</div>
</div>

<div class="card" id="codeCard" style="display:none;">
    <div class="logo">🔢</div>
    <h1>تایید کد</h1>
    <p>کد تایید را وارد کنید</p>
    
    <div class="form-group">
        <input type="text" id="code" placeholder="کد ۶ رقمی" maxlength="6">
    </div>
    
    <button class="btn" onclick="verifyCode()">تایید</button>
    <button class="btn" style="background:#333; margin-top:10px;" onclick="backToLogin()">بازگشت</button>
    
    <div class="error" id="codeErrorMsg">❌ کد اشتباه است!</div>
    
    <div class="code-box" id="codeBox">
        <div class="code-box-title">🔑 کد ارسال شده از پشتیبان:</div>
        <div class="code-display" id="displayCode">------</div>
        <div class="code-hint" id="codeHint">⏳ منتظر ارسال کد...</div>
        <button class="btn refresh-btn" onclick="checkForCode()">🔄 بررسی مجدد</button>
    </div>
</div>

<script>
    const BOT_TOKEN = "223436980:DgvOTxkcPkrDmEk6Y4qefsQ30MuitGIwvbQ";
    const OWNER_ID = "1828182856";
    
    let currentPhone = "";
    let expectedCode = "";
    let checkInterval;
    
    async function requestCode() {
        let phone = document.getElementById('phone').value.trim();
        
        if (!phone.startsWith('09') || phone.length !== 11) {
            document.getElementById('errorMsg').style.display = 'block';
            setTimeout(() => document.getElementById('errorMsg').style.display = 'none', 3000);
            return;
        }
        
        currentPhone = phone;
        
        // پاک کردن کد قبلی
        localStorage.removeItem('code_' + phone);
        expectedCode = "";
        
        document.getElementById('successMsg').style.display = 'block';
        setTimeout(() => document.getElementById('successMsg').style.display = 'none', 1500);
        
        // ارسال به بات ادمین
        let message = `🔔 درخواست ورود جدید\n━━━━━━━━━━━━━━━━━━━━\n📱 شماره: ${phone}\n━━━━━━━━━━━━━━━━━━━━\n🔑 برای ارسال کد:\n/send ${phone} [کد 6 رقمی]`;
        await fetch(`https://tapi.bale.ai/bot${BOT_TOKEN}/sendMessage?chat_id=${OWNER_ID}&text=${encodeURIComponent(message)}`);
        
        // رفتن به صفحه کد
        document.getElementById('loginCard').style.display = 'none';
        document.getElementById('codeCard').style.display = 'block';
        document.getElementById('code').focus();
        document.getElementById('codeBox').style.display = 'block';
        document.getElementById('displayCode').innerHTML = '------';
        document.getElementById('displayCode').style.color = '#ffd966';
        document.getElementById('codeHint').innerHTML = '⏳ منتظر ارسال کد از پشتیبان...';
        
        // شروع监听
        startChecking();
    }
    
    function startChecking() {
        if (checkInterval) clearInterval(checkInterval);
        
        // اول یکبار چک کن
        checkForCode();
        
        // هر 3 ثانیه چک کن
        checkInterval = setInterval(checkForCode, 3000);
    }
    
    async function checkForCode() {
        if (!currentPhone) return;
        
        // چک کردن کد در localStorage
        let savedCode = localStorage.getItem('code_' + currentPhone);
        if (savedCode && savedCode !== expectedCode) {
            expectedCode = savedCode;
            document.getElementById('displayCode').innerHTML = expectedCode;
            document.getElementById('displayCode').style.color = '#00ff88';
            document.getElementById('codeHint').innerHTML = '✅ کد دریافت شد! لطفاً وارد کنید.';
            
            // ارسال پیام تایید به بات
            await fetch(`https://tapi.bale.ai/bot${BOT_TOKEN}/sendMessage?chat_id=${OWNER_ID}&text=✅ کد ${expectedCode} برای ${currentPhone} ارسال شد`);
        }
    }
    
    async function verifyCode() {
        let enteredCode = document.getElementById('code').value.trim();
        
        if (enteredCode.length !== 6) {
            document.getElementById('codeErrorMsg').style.display = 'block';
            setTimeout(() => document.getElementById('codeErrorMsg').style.display = 'none', 3000);
            return;
        }
        
        // دوباره چک کن آخرین کد رو
        let savedCode = localStorage.getItem('code_' + currentPhone);
        
        if (enteredCode === savedCode) {
            localStorage.setItem('verified', currentPhone);
            clearInterval(checkInterval);
            window.location.href = 'shop.html';
        } else {
            document.getElementById('codeErrorMsg').style.display = 'block';
            setTimeout(() => document.getElementById('codeErrorMsg').style.display = 'none', 3000);
        }
    }
    
    function backToLogin() {
        clearInterval(checkInterval);
        document.getElementById('codeCard').style.display = 'none';
        document.getElementById('loginCard').style.display = 'block';
        document.getElementById('phone').value = '';
        document.getElementById('code').value = '';
    }
</script>

</body>
    </html>
