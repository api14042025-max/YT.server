<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>پنل مدیریت</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff88;
            font-family: monospace;
            padding: 20px;
        }
        .card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        button {
            background: #00aa55;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
        }
        .banned-list {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
        }
        input {
            background: #2a2a2a;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            width: 100%;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>💀 پنل مدیریت</h1>
        <button onclick="viewUsers()">👥 لیست کاربران</button>
        <button onclick="viewBanned()">🚫 لیست بن‌ها</button>
        <button onclick="clearBanned()">🗑 پاک کردن بن‌ها</button>
        <button onclick="sendBroadcast()">📢 ارسال به همه</button>
        <button onclick="sendToUser()">💬 ارسال پیام به کاربر</button>
    </div>
    
    <div class="card">
        <h3>📊 آمار</h3>
        <p id="stats">در حال بارگذاری...</p>
    </div>
    
    <div class="card" id="result">
        <p>منتظر فرمان...</p>
    </div>
    
    <script>
        const BOT_TOKEN = "223436980:DgvOTxkcPkrDmEk6Y4qefsQ30MuitGIwvbQ";
        const OWNER_ID = "1828182856";
        
        function viewUsers() {
            let users = localStorage.getItem('users') || '';
            document.getElementById('result').innerHTML = `<h3>👥 کاربران:</h3><pre>${users || 'هیچ کاربری ثبت نشده'}</pre>`;
        }
        
        function viewBanned() {
            let bans = '';
            for(let i=0; i<localStorage.length; i++) {
                let key = localStorage.key(i);
                if(key.startsWith('banned_')) {
                    bans += key.replace('banned_', '') + '\n';
                }
            }
            document.getElementById('result').innerHTML = `<h3>🚫 لیست بن‌ها:</h3><pre>${bans || 'هیچ بنی وجود ندارد'}</pre>`;
        }
        
        function clearBanned() {
            for(let i=localStorage.length-1; i>=0; i--) {
                let key = localStorage.key(i);
                if(key.startsWith('banned_')) {
                    localStorage.removeItem(key);
                }
            }
            document.getElementById('result').innerHTML = `<p>✅ همه بن‌ها پاک شدند</p>`;
        }
        
        function sendBroadcast() {
            let msg = prompt('متن پیام همگانی:');
            if(msg) {
                alert('پیام به همه کاربران ارسال شد');
                document.getElementById('result').innerHTML = `<p>✅ پیام ارسال شد: ${msg}</p>`;
            }
        }
        
        function sendToUser() {
            let userId = prompt('شماره کاربر:');
            let msg = prompt('متن پیام:');
            if(userId && msg) {
                fetch(`https://tapi.bale.ai/bot${BOT_TOKEN}/sendMessage?chat_id=${OWNER_ID}&text=/msg ${userId}: ${msg}`);
                alert('پیام ارسال شد');
            }
        }
        
        // آمار
        let stats = document.getElementById('stats');
        let userCount = 0;
        for(let i=0; i<localStorage.length; i++) {
            if(localStorage.key(i).startsWith('verified_')) userCount++;
        }
        stats.innerHTML = `👥 تعداد کاربران: ${userCount}\n🚫 تعداد بن‌ها: ${localStorage.length}`;
    </script>
</body>
</html>
